[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 3000
  framework = "vite"

# Proxy API calls to backend
[[redirects]]
  from = "/api/*"
  to = "https://api.example.com/api/:splat"
  status = 200

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
